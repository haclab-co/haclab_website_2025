<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Haclab</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .glow {
        font-size: 6rem;
        font-weight: 800;
        background: linear-gradient(135deg, #dc2626, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
      }
      h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; font-weight: 700; }
      p { color: #94a3b8; max-width: 400px; line-height: 1.6; margin-bottom: 2rem; }
      .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
      .links a {
        color: #f1f5f9;
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.2s;
        border: 1px solid #1e293b;
      }
      .links a:hover {
        background: #dc2626;
        border-color: #dc2626;
        color: #fff;
      }
      .links a.home {
        background: #dc2626;
        border-color: #dc2626;
        color: #fff;
      }
      .links a.home:hover {
        background: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="glow">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let us help you find what you need.</p>
    <div class="links">
      <a href="/" class="home">Home</a>
      <a href="/services">Services</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/contact">Contact</a>
    </div>
  </body>
</html>
