    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
